name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Monday 07:00 UTC — minimal-versions weekly health check.
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.toolchain }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        toolchain: [stable, "1.95"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.toolchain }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        toolchain: [stable, "1.95"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --locked

  doc:
    name: doc
    runs-on: ubuntu-22.04
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo doc --workspace --no-deps --locked

  audit:
    name: cargo-audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Transitive advisories we cannot remove (deep in the alloy / ark-*
          # crypto stack). Kept in sync with deny.toml [advisories].ignore.
          #   RUSTSEC-2024-0388  derivative         unmaintained; via ark-ff
          #   RUSTSEC-2024-0436  paste              unmaintained; via alloy-primitives / ark-*
          #   RUSTSEC-2026-0097  rand 0.8           unsound only under custom-logger reseed; not triggered here
          #   RUSTSEC-2026-0173  proc-macro-error2  unmaintained; via alloy-sol-macro, no safe upgrade
          ignore: RUSTSEC-2024-0388,RUSTSEC-2024-0436,RUSTSEC-2026-0097,RUSTSEC-2026-0173

  deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  typos:
    name: typos
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  spdx:
    # Every tracked .rs file must carry an SPDX-License-Identifier header so
    # downstream license scanners (REUSE, ScanCode, FOSSA) detect licensing
    # per file. Pure bash + git, no toolchain. Fix locally with:
    #   scripts/check-spdx.sh --fix
    name: spdx-headers
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: scripts/check-spdx.sh

  machete:
    # Detects unused workspace dependencies. Add ignores via
    # [package.metadata.cargo-machete] ignored = [...] in the offending
    # Cargo.toml when a dep is used only via macro re-export.
    name: cargo-machete
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Pin version: unpinned installs latest, and a machete false-positive
      # rule change can break CI overnight. Bump deliberately via Dependabot
      # or a manual PR, not silently.
      - run: cargo install cargo-machete --locked --version 0.9.2
      - run: cargo machete

  semver:
    # Detects breaking public-API changes in taskfast-cli. Uses git
    # baseline (PR base SHA) instead of crates.io — the crate is not
    # yet published, so registry lookup fails. Switch to the default
    # crates.io baseline after first publish.
    name: cargo-semver-checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-semver-checks --locked
      - env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: cargo semver-checks --package taskfast-cli --baseline-rev "$BASE_SHA"

  coverage:
    # Reports line coverage with llvm-cov. lcov.info is kept as a build
    # artifact (always) and uploaded to Codecov for historical trend, PR diff,
    # and the coverage gate in codecov.yml.
    name: coverage
    runs-on: ubuntu-22.04
    env:
      # Mapped to env so the upload step can gate on it: the job stays green
      # until the secret is provisioned, then the upload runs with
      # fail_ci_if_error. Secrets are not usable directly in step `if:`.
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 14
      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  minimal-versions:
    # Catches under-pinned semver ranges. Pulls the oldest version
    # satisfying each `^` constraint and tries to build. Runs weekly
    # (schedule) or on manual dispatch — flaps too often for PR gate.
    name: minimal-versions
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo +nightly update -Z minimal-versions
      - run: cargo +nightly build --workspace --locked

  spec-drift:
    # Two offline guards on the vendored OpenAPI spec:
    #   1. provenance gate — spec/openapi.yaml must match the sha256 recorded in
    #      spec/openapi.provenance.toml, so the file can't be hand-edited without
    #      going through scripts/vendor-spec.sh (root-cause guard for gh#51).
    #   2. `cargo xtask sync-spec` must succeed — the normalizer bails on
    #      structural drift (e.g. an ERROR_ALIAS diverging from Error), and the
    #      git diff confirms it mutated no tracked file (the normalized artifact
    #      itself is .gitignored and regenerated by taskfast-client/build.rs).
    name: spec-drift
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Spec provenance gate (offline)
        run: scripts/check-spec-drift.sh
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo xtask sync-spec
      - name: Ensure no drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::taskfast-client drifted from spec/openapi.yaml. Run: cargo xtask sync-spec"
            exit 1
          fi

  spec-upstream-drift:
    # Fetches the live server OpenAPI spec and fails if the vendored copy has
    # gone stale against it. Scheduled/dispatch only — never gates PRs, so a
    # server-side deploy can't turn unrelated CLI PRs red, and the job doesn't
    # depend on staging being reachable during PR review. Drift here means the
    # server moved ahead: re-vendor with scripts/vendor-spec.sh. This is the
    # proactive half of the gh#51 stale-spec guard.
    name: spec-upstream-drift
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: scripts/check-spec-drift.sh --upstream

  notify-discord:
    # Posts a single consolidated run result to Discord. Mirrors the
    # pattern in docker.yml. Skipped for pull_request events to avoid
    # spam — PR status is already visible in the GitHub checks UI.
    name: Notify Discord
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    needs:
      - fmt
      - clippy
      - test
      - doc
      - audit
      - deny
      - typos
      - spdx
      - machete
      - semver
      - coverage
      - minimal-versions
      - spec-drift
      - spec-upstream-drift
    runs-on: ubuntu-22.04
    permissions:
      actions: read
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      CI_RESULT: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
    steps:
      - name: Compute run summary
        id: summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          format_duration() {
            local total_seconds=$1
            local hours=$((total_seconds / 3600))
            local minutes=$(((total_seconds % 3600) / 60))
            local seconds=$((total_seconds % 60))
            printf '%02dh %02dm %02ds' "$hours" "$minutes" "$seconds"
          }

          run_started_at=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.run_started_at')
          start_epoch=$(date -d "$run_started_at" +%s)
          now_epoch=$(date +%s)
          duration=$(format_duration $((now_epoch - start_epoch)))

          if [[ "$CI_RESULT" == "success" ]]; then
            status="passed"
            emoji="✅"
          else
            status="failed"
            emoji="❌"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "emoji=$emoji" >> "$GITHUB_OUTPUT"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Actions for Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK }}
        with:
          args: |
            ${{ steps.summary.outputs.emoji }} CI ${{ steps.summary.outputs.status }} for `${{ github.repository }}`
            `Branch  :` [${{ github.ref_name }}](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }})
            `SHA     :` [`${{ steps.summary.outputs.sha_short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            `Event   :` `${{ github.event_name }}`
            `Duration:` `${{ steps.summary.outputs.duration }}`
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
