# Advisory scheduled health checks, intentionally split out of ci.yml.
#
# ci.yml is the gating workflow (PR + push) whose status badge is the
# project's public health signal. These jobs are schedule/dispatch only
# and historically flap because they pull ancient transitive crates
# (minimal-versions) or depend on staging reachability (spec-upstream-drift).
# Running them inside ci.yml meant a flaky advisory job turned the main CI
# badge red even when every gating check passed. Keeping them here means:
#   * the ci.yml badge reflects real code health, and
#   * advisory failures still run on schedule and notify Discord,
#     without reddening the gating workflow.
#
# This workflow has no `pull_request`/`push` triggers by design.

name: CI (scheduled)

on:
  schedule:
    # Monday 07:00 UTC — weekly advisory health checks.
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  minimal-versions:
    # Catches under-pinned semver ranges. Pulls the oldest version
    # satisfying each `^` constraint and tries to build. Advisory only —
    # flaps too often for the PR gate because ancient transitive crates
    # (e.g. rustix 0.36 via old clap, getrandom 0.1 via eth-keystore→uuid
    # 0.8) do not compile on modern nightly. See bd tfcli-3xe / follow-up
    # floor-tightening issue for the durable fix.
    name: minimal-versions
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo +nightly update -Z minimal-versions
      - run: cargo +nightly build --workspace --locked

  spec-upstream-drift:
    # Fetches the live server OpenAPI spec and fails if the vendored copy has
    # gone stale against it. Scheduled/dispatch only — never gates PRs, so a
    # server-side deploy can't turn unrelated CLI PRs red, and the job doesn't
    # depend on staging being reachable during PR review. Drift here means the
    # server moved ahead: re-vendor with scripts/vendor-spec.sh. This is the
    # proactive half of the gh#51 stale-spec guard.
    name: spec-upstream-drift
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: scripts/check-spec-drift.sh --upstream

  notify-discord:
    # Mirrors the notify pattern in ci.yml / docker.yml, but only aggregates
    # the advisory scheduled jobs in this workflow.
    name: Notify Discord
    if: ${{ always() }}
    needs:
      - minimal-versions
      - spec-upstream-drift
    runs-on: ubuntu-22.04
    permissions:
      actions: read
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      CI_RESULT: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
    steps:
      - name: Compute run summary
        id: summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          format_duration() {
            local total_seconds=$1
            local hours=$((total_seconds / 3600))
            local minutes=$(((total_seconds % 3600) / 60))
            local seconds=$((total_seconds % 60))
            printf '%02dh %02dm %02ds' "$hours" "$minutes" "$seconds"
          }

          run_started_at=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.run_started_at')
          start_epoch=$(date -d "$run_started_at" +%s)
          now_epoch=$(date +%s)
          duration=$(format_duration $((now_epoch - start_epoch)))

          if [[ "$CI_RESULT" == "success" ]]; then
            status="passed"
            emoji="✅"
          else
            status="failed"
            emoji="❌"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "emoji=$emoji" >> "$GITHUB_OUTPUT"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Actions for Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK }}
        with:
          args: |
            ${{ steps.summary.outputs.emoji }} CI-scheduled (advisory) ${{ steps.summary.outputs.status }} for `${{ github.repository }}`
            `Branch  :` [${{ github.ref_name }}](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }})
            `SHA     :` [`${{ steps.summary.outputs.sha_short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            `Event   :` `${{ github.event_name }}`
            `Duration:` `${{ steps.summary.outputs.duration }}`
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
