version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch:
        patterns: ["*"]
        update-types: ["patch"]
      minor:
        patterns: ["*"]
        update-types: ["minor"]
    # rand 0.9 bumps rand_core 0.6 -> 0.9. alloy-signer-local v1 / eth-keystore
    # 0.5 still take a rand_core 0.6 RNG in `PrivateKeySigner::encrypt_keystore`
    # (see crates/taskfast-agent/src/keystore.rs), so a 0.9 RNG can't satisfy
    # that bound — the bump can't compile until we migrate to alloy v2. Re-bump
    # manually then. (gh#25)
    ignore:
      - dependency-name: "rand"
        versions: [">=0.9"]
    labels:
      - dependencies
      - triage

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    # release.yml is generated by cargo-dist; bumping these breaks `dist plan`
    # drift check. Regenerate via `dist init` on cargo-dist upgrade instead.
    # Note: also blocks bumps in ci.yml/docker.yml — bump manually when needed.
    ignore:
      - dependency-name: "actions/checkout"
      - dependency-name: "actions/upload-artifact"
      - dependency-name: "actions/download-artifact"
      - dependency-name: "actions/attest-build-provenance"
    labels:
      - dependencies
      - triage
