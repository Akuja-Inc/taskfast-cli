# Codecov configuration.
#
# Becomes active once the repository is connected to Codecov and the
# CODECOV_TOKEN secret is set (see the `coverage` job in
# .github/workflows/ci.yml). Until then it has no effect.
coverage:
  status:
    project:
      default:
        target: auto      # never regress overall coverage vs the base commit
        threshold: 1%     # tolerate <=1% measurement noise
    patch:
      default:
        target: 60%       # new / changed lines must be >=60% covered

comment:
  layout: "reach, diff, flags, files"
  require_changes: true   # only post a PR comment when coverage actually moves
